version: '3.8'
services:
  app:
    build: .
    container_name: inventory-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    volumes:
      - ./:/app:delegated
  mongo:
    image: mongo:6.0
    container_name: inventory-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
