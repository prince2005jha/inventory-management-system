<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Management</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #093920, #3a7bd5);
            color: white;
            font-family: 'Nunito', sans-serif;
        }
        .container {
            margin-top: 50px;
        }
        .btn-back {
            background-color: white;
            color: #007bff;
            font-weight: bold;
            border-radius: 10px;
            padding: 10px 20px;
            margin-bottom: 20px;
            transition: 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-back:hover {
            background-color: #0056b3;
            color: white;
        }
        .upload-section {
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
        }
        .upload-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .upload-card {
            background-color: #ffffff;
            color: #333;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.1);
            transition: 0.3s ease-in-out;
        }
        .upload-card:hover {
            box-shadow: 0px 5px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(-5px);
        }
        .file-info {
            font-size: 1rem;
            margin-top: 10px;
            color: #555;
        }
        .file-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-upload {
            background-color: #42b883;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            padding: 10px 20px;
            transition: 0.3s ease;
            width: 48%;
        }
        .btn-upload:hover {
            background-color: #38a66f;
        }
        .file-list {
            margin-top: 30px;
            padding: 0;
            list-style-type: none;
        }
        .file-list li {
            background-color: #ffffff;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-list li .file-name {
            font-weight: bold;
            font-size: 1rem;
            color: black; /* Changed text color to black */
        }
        .file-list li .file-actions button {
            background-color: #ff758c;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            padding: 5px 15px;
            border: none;
            transition: 0.3s ease;
        }
        .file-list li .file-actions button:hover {
            background-color: #f2444f;
        }
    </style>
</head>
<body>

    <div class="container text-center">
        <!-- Back Button -->
        <a href="index.html" class="btn btn-back">⬅ Back to Home</a>

        <div class="upload-section">
            <h1 class="upload-title">📂 File Management</h1>

            <!-- File Upload Card -->
            <div class="upload-card">
                <h3>Upload a New File</h3>
                <div class="input-area">
                    <!-- Hidden file input -->
                    <input type="file" id="fileInput" class="form-control mb-3" style="display: none;" onchange="uploadFile()">
                    <button class="btn btn-upload" onclick="triggerFileInput()">Upload File</button>
                </div>
                <p class="file-info">Accepted formats: PDF, DOCX, JPG, PNG (max 10MB)</p>
            </div>

            <!-- File List Section -->
            <div class="file-card mt-5">
                <h3>Uploaded Files</h3>
                <ul class="file-list" id="fileList">
                    <!-- Dynamically loaded file list will appear here -->
                </ul>
            </div>
        </div>

    </div>

    <script>
        // Sample file data (you can replace this with actual file handling functionality)
        let files = [];

        // Trigger the file input dialog
        function triggerFileInput() {
            document.getElementById("fileInput").click();
        }

        // Handle file upload
        function uploadFile() {
            let fileInput = document.getElementById("fileInput");
            let file = fileInput.files[0];

            if (!file) {
                alert("Please choose a file to upload.");
                return;
            }

            // Add file to the list (for demonstration purposes, this will not upload to a server)
            files.push({ name: file.name, size: file.size, type: file.type });

            // Update the file list display
            displayFileList();

            alert("File uploaded: " + file.name);
            fileInput.value = ""; // Reset the input
        }

        function displayFileList() {
            let fileListContainer = document.getElementById("fileList");
            fileListContainer.innerHTML = ""; // Clear the existing list

            files.forEach(file => {
                let listItem = document.createElement("li");
                listItem.innerHTML = `
                    <span class="file-name">${file.name}</span>
                    <div class="file-actions">
                        <button onclick="downloadFile('${file.name}')">Download</button>
                        <button onclick="deleteFile('${file.name}')">Delete</button>
                    </div>
                `;
                fileListContainer.appendChild(listItem);
            });
        }

        function downloadFile(fileName) {
            alert(`Downloading: ${fileName}`);
            // Here, you can implement actual file downloading logic
        }

        function deleteFile(fileName) {
            files = files.filter(file => file.name !== fileName);
            displayFileList();
            alert(`File deleted: ${fileName}`);
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Footer Section -->

</body>
</html>
